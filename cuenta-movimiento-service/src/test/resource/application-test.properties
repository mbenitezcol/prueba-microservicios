# === Oracle Database Config ===
spring.datasource.url=jdbc:oracle:thin:@${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}/${ORACLE_SID:XEPDB1}
spring.datasource.username=${ORACLE_USER:prueba}
spring.datasource.password=${ORACLE_PASSWORD:prueba}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

servicio.cliente-persona.url=${SERVICIO_CLIENTE_PERSONA_URL}

# === JPA Config ===
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect

# === Server Port ===
server.port=${SERVER_PORT:8082}
